spring:
  application:
    name: vibeflow-kanban

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vibeflow_db}
    username: ${DB_USERNAME:vibeflow}
    password: ${DB_PASSWORD:vibeflow}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' automatically creates the token_blacklist table on first boot
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false   # set to true for debugging only; avoid in production

  mail:
    host: ${MAIL_HOST:smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:your_mailtrap_user}
    password: ${MAIL_PASSWORD:your_mailtrap_pass}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    com.vibeflow: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  # Must be >= 32 characters (256 bits) for HMAC-SHA256.
  # Override with the JWT_SECRET environment variable in production.
  # The default below satisfies the length requirement for local dev only.
  secret: ${JWT_SECRET:vibeflow-enterprise-jwt-secret-key-min-256bits-dev}
  # 8 hours in milliseconds (down from 24h to limit exposure window)
  expiration: ${JWT_EXPIRATION:28800000}

cors:
  allowed-origins: http://localhost:4200,http://localhost:3000
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
