<section class="report-page" *ngIf="report as currentReport">
  <header class="report-page__header">
    <div>
      <p class="report-page__eyebrow">Time Report</p>
      <h1>Logged hours across the shared board</h1>
    </div>
    <div class="report-page__total">
      <span>Grand Total</span>
      <strong>{{ currentReport.grandTotal | number: '1.2-2' }}h</strong>
    </div>
  </header>

  <table mat-table [dataSource]="currentReport.tasks" class="report-table">
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef>Title</th>
      <td mat-cell *matCellDef="let row">{{ row.title }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row">{{ row.status }}</td>
    </ng-container>

    <ng-container matColumnDef="assignee">
      <th mat-header-cell *matHeaderCellDef>Assignee</th>
      <td mat-cell *matCellDef="let row">{{ row.assignee || 'Unassigned' }}</td>
    </ng-container>

    <ng-container matColumnDef="totalHours">
      <th mat-header-cell *matHeaderCellDef>Total Hours</th>
      <td mat-cell *matCellDef="let row">{{ row.totalHours | number: '1.2-2' }}h</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</section>
