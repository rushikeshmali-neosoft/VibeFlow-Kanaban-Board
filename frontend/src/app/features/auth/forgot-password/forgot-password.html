<div class="auth-shell">
  <div class="auth-card auth-card--centered">
    <div class="auth-card__right auth-card__right--full">
      <h2 class="auth-card__title">Reset Password</h2>
      <p class="auth-card__subtitle" *ngIf="step === 'EMAIL'">Enter your registered email to receive an OTP.</p>
      <p class="auth-card__subtitle" *ngIf="step === 'OTP'">Enter the 6-digit OTP sent to your email.</p>
      <p class="auth-card__subtitle" *ngIf="step === 'RESET'">Set your new password.</p>

      <!-- Step 1: Email -->
      <form *ngIf="step === 'EMAIL'" [formGroup]="emailForm" (ngSubmit)="submitEmail()" class="auth-form" novalidate>
        <div class="auth-field">
          <input
            class="auth-field__input"
            type="email"
            formControlName="email"
            placeholder="Email address"
            autocomplete="email"
          />
        </div>
        <button class="auth-btn" type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Sending...' : 'SEND OTP' }}
        </button>
      </form>

      <!-- Step 2: OTP -->
      <form *ngIf="step === 'OTP'" [formGroup]="otpForm" (ngSubmit)="submitOtp()" class="auth-form" novalidate>
        <div class="auth-field">
          <input
            class="auth-field__input"
            type="text"
            formControlName="otp"
            placeholder="6-digit OTP"
            autocomplete="off"
            maxlength="6"
          />
        </div>
        <button class="auth-btn" type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Verifying...' : 'VERIFY OTP' }}
        </button>
      </form>

      <!-- Step 3: Reset Password -->
      <form *ngIf="step === 'RESET'" [formGroup]="resetForm" (ngSubmit)="submitReset()" class="auth-form" novalidate>
        <div class="auth-field auth-field--with-action">
          <input
            class="auth-field__input"
            [type]="showNewPassword ? 'text' : 'password'"
            formControlName="newPassword"
            placeholder="New password"
            autocomplete="new-password"
          />
          <button type="button" class="auth-field__toggle" (click)="toggleNewPassword()">
            {{ showNewPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
        <div class="auth-field auth-field--with-action">
          <input
            class="auth-field__input"
            [type]="showConfirmPassword ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder="Confirm new password"
            autocomplete="new-password"
          />
          <button type="button" class="auth-field__toggle" (click)="toggleConfirmPassword()">
            {{ showConfirmPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
        <div *ngIf="resetForm.get('confirmPassword')?.hasError('mismatch')" class="auth-error">
          Passwords do not match.
        </div>
        <button class="auth-btn" type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Resetting...' : 'RESET PASSWORD' }}
        </button>
      </form>

      <div class="auth-row" style="justify-content: center; margin-top: 16px;">
        <a class="auth-link" routerLink="/login">Back to Login</a>
      </div>
    </div>
  </div>
</div>
