<section class="auth-page">
  <div class="auth-page__panel">
    <p class="auth-page__eyebrow">Shared Workspace</p>
    <h1>Sign in to VibeFlow</h1>
    <p class="auth-page__copy">
      One board, one flow, real-time task movement across the whole team.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" />
      </mat-form-field>

      <button mat-flat-button class="auth-form__submit" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Signing In...' : 'Login' }}
      </button>
    </form>

    <a class="auth-page__link" routerLink="/register">Create a new account</a>
  </div>
</section>
