<nav class="sidebar" [class.sidebar--collapsed]="collapsed$ | async">

  <!-- ── Logo + Toggle row ──────────────────────────────────── -->
  <div class="sidebar__logo-area">
    <div class="sidebar__logo-icon">
      <mat-icon>view_kanban</mat-icon>
    </div>

    <div class="sidebar__logo-text">
      <span class="sidebar__app-name">VibeFlow</span>
      <span class="sidebar__app-sub">Enterprise Workspace</span>
    </div>

  </div>

  <!-- ── Nav items ─────────────────────────────────────────── -->
  <ul class="sidebar__menu">
    <li class="sidebar__menu-item" *ngFor="let item of menuItems" [class.sidebar__menu-item--active]="item.active"
      (click)="navigate(item.route)" [matTooltip]="(collapsed$ | async) ? item.label : ''" matTooltipPosition="right">
      <mat-icon class="sidebar__menu-icon">{{ item.icon }}</mat-icon>
      <span class="sidebar__menu-label">{{ item.label }}</span>
      <span class="sidebar__active-bar" *ngIf="item.active"></span>
    </li>
  </ul>

</nav>
